apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Restore correct namespace for Gateways — the base sets
# namespace: redhat-ods-applications which overrides the explicit
# openshift-ingress namespace in the gateway resources.
patches:
  - target:
      kind: Gateway
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: openshift-ingress

components:
  - ../../components/components-aipipelines
  - ../../components/components-feast
  - ../../components/components-kserve
  - ../../components/components-kserve-maas
  - ../../components/components-modelregistry
  - ../../components/components-ray
  - ../../components/components-trainingoperator
  - ../../components/components-trustyai
  - ../../components/components-workbenches
  - ../../components/hardware-profiles-nvidia-gpu
  - ../../components/idle-notebook-culling
  - ../../components/inference-gateway
  - ../../components/rhoai-auth
